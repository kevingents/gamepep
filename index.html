<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Diamant Haarlem</title>
  </head>
  <body>
    <div id="app">
      <header id="hud">
        <div id="level" class="hud-item">RONDE 1</div>
        <div id="hearts" class="hud-item"></div>
        <div id="score" class="hud-item hud-score">00000</div>
        <div id="diamonds" class="hud-item"></div>
        <button id="mute" class="hud-btn" aria-label="Geluid aan of uit"></button>
      </header>

      <main id="stage">
        <canvas id="game"></canvas>
        <div id="toast" class="toast"></div>

        <!-- Haarlem-weetje (educatief) -->
        <div id="factcard" class="factcard">
          <div class="factcard-name" id="factName"></div>
          <div class="factcard-text" id="factText"></div>
        </div>

        <!-- Arcade intro -->
        <div id="intro" class="screen show">
          <div class="arcade">
            <h1 class="arcade-title">DIAMANT<br />HAARLEM</h1>
            <p class="arcade-sub">Pak alle diamanten in Haarlem!</p>
            <p class="arcade-greeting" id="introGreeting"></p>
            <p class="arcade-hi">TOPSCORE <span id="introHi">0</span></p>
            <button class="arcade-btn" id="btnPlay">SPELEN</button>
            <button class="arcade-btn alt" id="btnCreator">MAAK JE POPJE</button>
            <p class="arcade-blink">DRUK OP SPELEN</p>
          </div>
        </div>

        <!-- Popje maken -->
        <div id="creator" class="screen">
          <div class="creator-panel">
            <h2 class="creator-title">MAAK JE POPJE</h2>
            <div class="creator-name">
              <label for="nameInput">Naam</label>
              <input id="nameInput" maxlength="10" placeholder="Jouw naam" autocomplete="off" />
            </div>
            <div id="creatorRows"></div>
            <button class="arcade-btn" id="btnCreatorDone">KLAAR</button>
          </div>
        </div>

        <!-- Game over + highscores -->
        <div id="gameover" class="screen">
          <div class="arcade">
            <h1 class="arcade-title small">GAME OVER</h1>
            <p class="arcade-score">SCORE <span id="finalScore">0</span></p>
            <div id="initialsBox" class="initials">
              <p>NIEUWE HIGHSCORE! Je naam:</p>
              <div class="initials-row">
                <input id="initialsInput" maxlength="10" placeholder="naam" autocomplete="off" />
                <button class="arcade-btn small-btn" id="btnSaveScore">OK</button>
              </div>
            </div>
            <table id="hiTable" class="hi-table"></table>
            <button class="arcade-btn alt" id="btnRestart">OPNIEUW</button>
          </div>
        </div>
      </main>

      <nav id="controls" aria-label="Bediening">
        <button class="dpad-btn dpad-up" data-dir="up" aria-label="Omhoog"></button>
        <button class="dpad-btn dpad-left" data-dir="left" aria-label="Naar links"></button>
        <button class="dpad-btn dpad-right" data-dir="right" aria-label="Naar rechts"></button>
        <button class="dpad-btn dpad-down" data-dir="down" aria-label="Omlaag"></button>
      </nav>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
