<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1b2230" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Diamant Wereld</title>
  </head>
  <body>
    <div id="app">
      <header id="hud">
        <div id="level" class="hud-item">Level 1</div>
        <div id="hearts" class="hud-item"></div>
        <div id="diamonds" class="hud-item"></div>
        <button id="mute" class="hud-btn" aria-label="Geluid aan of uit"></button>
      </header>

      <main id="stage">
        <canvas id="game"></canvas>

        <div id="overlay" class="overlay show">
          <div class="ov-card">
            <h1 class="ov-title">Diamant Wereld</h1>
            <p class="ov-text">
              Loop met Steve door de wereld en pak alle diamanten.
              Pas op voor de creepers! Houd de knoppen ingedrukt om te lopen.
            </p>
            <button class="ov-btn">Spelen</button>
          </div>
        </div>
      </main>

      <nav id="controls" aria-label="Bediening">
        <button class="dpad-btn dpad-up" data-dir="up" aria-label="Omhoog"></button>
        <button class="dpad-btn dpad-left" data-dir="left" aria-label="Naar links"></button>
        <button class="dpad-btn dpad-right" data-dir="right" aria-label="Naar rechts"></button>
        <button class="dpad-btn dpad-down" data-dir="down" aria-label="Omlaag"></button>
      </nav>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
